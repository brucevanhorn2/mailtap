name: CI

on:
  push:
    branches: [master]
    tags: ['v*.*.*']
  pull_request:
    branches: [master]

jobs:
  # ─── Typecheck ───────────────────────────────────────────────────────────────
  # Runs on every push and PR. Does not require native module rebuild.
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (skip native rebuild)
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

  # ─── Build ───────────────────────────────────────────────────────────────────
  # Runs only on version tags (e.g. v1.2.3). Produces platform artifacts.
  build:
    name: Build (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: typecheck
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: build:linux
            artifacts: 'dist/*.AppImage dist/*.deb'
          - os: macos-latest
            script: build:mac
            artifacts: 'dist/*.dmg'
          - os: windows-latest
            script: build:win
            artifacts: 'dist/*.exe'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npm run postinstall

      # Skip code signing until certificates are available
      - name: Build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mailtap-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  # ─── Release ─────────────────────────────────────────────────────────────────
  # Creates a GitHub Release and attaches all build artifacts.
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
